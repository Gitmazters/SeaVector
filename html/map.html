<!DOCTYPE html>
<html lang="sv">

<head>
  <meta charset="UTF-8">
  <title>Navigationskarta</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">
  <link rel="stylesheet" href="../css/map.css">
</head>

<body>
  <div id="controls">
    <input id="lat" type="number" step="any" placeholder="Latitud t.ex. 57.6348">
    <input id="lng" type="number" step="any" placeholder="Longitud t.ex. 18.2948">

    <button id="zoomBtn">Zooma till position</button>
    <button id="clearBtn">Rensa kurslinje</button>
    <button id="goBack"><a href="../index.html">Gå tillbaka till strömberäkning</a></button>
    <span id="distance">Distans: 0 NM</span>
  </div>

  <div id="map"></div>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script src="../script/map.js"></script>
</body>

</html>
