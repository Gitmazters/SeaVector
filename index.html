<!DOCTYPE html>
<html lang="sv">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sjöräddning - Strömberäkning</title>
  <link rel="stylesheet" href="css/style.css" />
  <script src="script/main.js"></script>
  <script src="script/weatherdata.js"></script>
</head>

<body>
  <main class="container">
    <h1>Strömberäkning</h1>
    <p>Beräkna fart, distans eller tid i nautiska mil.</p>
    <a href="html/map.html">Gå direkt till distansverktyget</a>

    <section class="card">
      <label>Distans, nautiska mil</label>
      <input id="distance" type="number" step="0.01" placeholder="Ex. 2.5" />

      <label>Tid, timmar</label>
      <input id="time" type="number" step="0.01" placeholder="Ex. 1.5" />

      <label>Fart, knop</label>
      <input id="speed" type="number" step="0.01" placeholder="Ex. 1.7" />

      <div class="buttons">
        <button onclick="calculateSpeed()">Beräkna fart</button>
        <button onclick="calculateDistance()">Beräkna distans</button>
        <button onclick="calculateTime()">Beräkna tid</button>
        <button class="secondary" onclick="clearFields()">Rensa</button>
      </div>

      <p id="result" class="result"></p>
    </section>

    <section class="card">
      <h2>Distans mellan två positioner</h2>

      <label>Latitud punkt 1</label>
      <input id="lat1" type="number" step="0.000001" placeholder="Ex. 57.6348" />

      <label>Longitud punkt 1</label>
      <input id="lon1" type="number" step="0.000001" placeholder="Ex. 18.2948" />

      <label>Latitud punkt 2</label>
      <input id="lat2" type="number" step="0.000001" placeholder="Ex. 57.6400" />

      <label>Longitud punkt 2</label>
      <input id="lon2" type="number" step="0.000001" placeholder="Ex. 18.3100" />

      <button onclick="calculateNauticalDistance()">Beräkna nautisk distans</button>

      <p id="mapResult" class="result"></p>
    </section>

    <section class="card">
      <h2>Väder och sjö</h2>

      <input id="weatherLat" type="text" value="57.6348" placeholder="Latitud">
      <input id="weatherLon" type="text" value="18.2948" placeholder="Longitud">

      <button id="getPositionBtn">Hämta min position</button>
      <button id="loadWeatherBtn">Hämta väder</button>

      <p id="positionStatus">Ingen position hämtad.</p>

      <h3>Väder</h3>
      <p id="weatherResult">Ingen prognos hämtad.</p>

      <h3>Våghöjd</h3>
      <p id="waveResult">Ingen vågdata hämtad.</p>
    </section>

  </main>
</body>

</html>
