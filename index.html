<!DOCTYPE html>
<html lang="sv">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SeaVector</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

  <script src="script/main.js"></script>
  <script src="script/weatherdata.js"></script>
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script src="script/AIS.js" type="module"></script>
</head>

<body>
  <main class="container">
    <section class="card">
      <h1>Welcome to SeaVector</h1>
      <p>Calculate maritime distances, speeds and times.</p>
      <button class="buttons"><a href="html/map.html">Distance Tool</a></button>
    </section>
    
    <section class="card">
      <h2>Other boats nearby</h2>
      <div id="aisMap"></div>
    </section>

    <section class="card">
      <h1>Maritime calculations</h1>
      <p>Calculate maritime distances, speeds and times.</p>
      <label>Distance, nautical miles</label>
      <input id="distance" type="number" step="0.01" placeholder="Ex. 2.5" />

      <label>Time, hours</label>
      <input id="time" type="number" step="0.01" placeholder="Ex. 1.5" />

      <label>Speed, knots</label>
      <input id="speed" type="number" step="0.01" placeholder="Ex. 1.7" />

      <div class="buttons">
        <button onclick="calculateSpeed()">Calculate Speed</button>
        <button onclick="calculateDistance()">Calculate Distance</button>
        <button onclick="calculateTime()">Calculate Time</button>
        <button class="secondary" onclick="clearFields()">Clear</button>
      </div>

      <p id="result" class="result"></p>
    </section>

    <section class="card">
      <h2>Distance between two positions</h2>

      <label>Latitude point 1</label>
      <input id="lat1" type="number" step="0.000001" placeholder="Ex. 57.6348" />

      <label>Longitude point 1</label>
      <input id="lon1" type="number" step="0.000001" placeholder="Ex. 18.2948" />

      <label>Latitude point 2</label>
      <input id="lat2" type="number" step="0.000001" placeholder="Ex. 57.6400" />

      <label>Longitude point 2</label>
      <input id="lon2" type="number" step="0.000001" placeholder="Ex. 18.3100" />
      <br>
      <button onclick="calculateNauticalDistance()">Calculate nautical distance</button>

      <p id="mapResult" class="result"></p>
    </section>

    <section class="card">
      <h2>Weather and sea</h2>

      <input id="weatherLat" type="text" value="57.6348" placeholder="Latitude">
      <input id="weatherLon" type="text" value="18.2948" placeholder="Longitude"><br>

      <button id="getPositionBtn">Get my position</button>
      <p id="positionStatus">No position fetched.</p>

      <h3>Weather</h3>
      <p id="weatherResult">Ingen prognos hämtad.</p>
    </section>

  </main>
</body>

</html>
